---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: garage-backup
  namespace: cnpg-homeassistant
spec:
  retentionPolicy: "3d"
  configuration:
    destinationPath: s3://cnpg-backups/
    endpointURL: https://garage-s3-prod.goepp.net
    s3Credentials:
      accessKeyId:
        name: garage-creds
        key: GARAGE_ACCESS_KEY
      secretAccessKey:
        name: garage-creds
        key: GARAGE_SECRET_KEY

---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: homeassistant-prod
  namespace: cnpg-homeassistant
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie
  instances: 2

  storage:
    size: 10Gi

  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1024Mi"
      cpu: "4"

  postgresql:
    parameters:
      timezone: "America/New_York"

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - k3s-prod-11
                  - k3s-prod-12
                  - k3s-prod-13

  env:
    - name: AWS_DEFAULT_REGION
      value: garage

  bootstrap:
    initdb:
      database: homeassistant
      owner: homeassistant

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: garage-backup
        isWALArchiver: "true"

---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: homeassistant-prod-backup
  namespace: cnpg-homeassistant
spec:
  schedule: "0 0 0 * * *"
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  immediate: true
  cluster:
    name: homeassistant-prod

---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMPodScrape
metadata:
  name: cnpg-prod-monitor
  namespace: cnpg-homeassistant
spec:
  podMetricsEndpoints:
    - port: metrics
  selector:
    matchLabels:
      "cnpg.io/cluster": homeassistant-prod
