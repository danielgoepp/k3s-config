---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: openclaw
spec:
  type: ClusterIP
  selector:
    app: openclaw
  ports:
    - name: gateway
      port: 18789
      targetPort: 18789
      protocol: TCP

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw-ingress
  namespace: openclaw
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`openclaw-prod.goepp.net`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: openclaw
          port: 18789
